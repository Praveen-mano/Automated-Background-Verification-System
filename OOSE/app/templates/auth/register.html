{% extends "base.html" %}
{% block title %}Candidate Registration{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="h4 mb-3">Candidate Registration</h2>
        <form method="post" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input class="form-control" name="full_name" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input class="form-control" name="phone">
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" name="email" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Username</label>
            <input class="form-control" name="username" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" name="password" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Confirm Password</label>
            <input class="form-control" type="password" name="confirm_password" required>
          </div>
          <div class="col-12">
            <button class="btn btn-success" type="submit">Register Candidate</button>
            <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary">Back to Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
